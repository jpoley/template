server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the backend service on the compose network.
  # In other environments (Azure Front Door, standalone deploys) the proxy
  # lives at the edge instead; this block only matters for `docker compose`.
  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Service worker and manifest must never be cached aggressively.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Hashed assets — long-lived cache.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
