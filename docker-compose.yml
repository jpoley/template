name: projecttemplate

services:
  cosmos:
    # Linux-based Cosmos emulator (vNext preview). Single-partition, no TLS gymnastics.
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: projecttemplate-cosmos
    ports:
      - "8081:8081"
      - "1234:1234"
    environment:
      PROTOCOL: "http"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/_explorer/emulator.pem"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 40s
    volumes:
      - cosmos-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projecttemplate-backend
    depends_on:
      cosmos:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Cosmos__Endpoint: "http://cosmos:8081"
      Cosmos__Key: "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
      Cosmos__DatabaseName: "projecttemplate"
      Cosmos__ContainerName: "items"
      Cosmos__UseManagedIdentity: "false"
      Cors__Origins__0: "http://localhost:5173"
      Cors__Origins__1: "http://localhost:5174"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projecttemplate-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: projecttemplate-admin
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  cosmos-data:
