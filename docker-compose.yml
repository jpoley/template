name: projecttemplate

# ------------------------------------------------------------------------------
# Database provider is selected via compose profiles. Exactly one of these
# should be active at a time:
#   docker compose --profile postgres  up ...
#   docker compose --profile sqlserver up ...
#
# Postgres is the default; SqlServer is retained as an optional alternative.
# The `backend` service always runs; it reads Database__Provider from the env.
# Use `./rebuild.sh <provider>` for the easy path.
# ------------------------------------------------------------------------------

services:
  sqlserver:
    profiles: ["sqlserver"]
    # Azure SQL Edge: Microsoft's SQL Server-compatible image with native arm64
    # + amd64 manifests. T-SQL surface matches what EF Core's SqlServer provider
    # uses. Microsoft stopped shipping new versions in 2024, but the image is
    # stable and the EF Core provider speaks to it unchanged. Use real SQL Server
    # in production via Azure SQL / Managed Instance.
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: projecttemplate-sqlserver
    ports:
      - "6433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LocalDev!1234"
    healthcheck:
      # Azure SQL Edge doesn't ship sqlcmd. Use a bash /dev/tcp probe on 1433;
      # the backend's EF Core retry-on-failure covers the short window between
      # "port accepting" and "engine fully ready".
      test: ["CMD-SHELL", "bash -c '(</dev/tcp/localhost/1433) 2>/dev/null'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 45s
    volumes:
      - sqlserver-data:/var/opt/mssql

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: projecttemplate-postgres
    ports:
      - "6432:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — run ./rebuild.sh to auto-generate it in .env}"
      POSTGRES_DB: "projecttemplate"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projecttemplate"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # `enterprise-ca` is a named build context exposing the repo's certs/
      # directory. install-ca-in-image.sh inside it no-ops when no real cert
      # is staged. See docs/enterprise-proxy.md.
      additional_contexts:
        enterprise-ca: ./certs
      # Local dev always uses the debug image (vsdbg + Debug build). Production
      # builds (CI, Azure Container Apps) should target `runtime` explicitly.
      target: debug
      args:
        BUILD_CONFIG: Debug
    container_name: projecttemplate-backend
    depends_on:
      sqlserver:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: "${DB_PROVIDER:-Postgres}"
      # Connection strings (cross-container hostnames)
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=projecttemplate;User Id=sa;Password=LocalDev!1234;TrustServerCertificate=True;"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=projecttemplate;Username=postgres;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — run ./rebuild.sh to auto-generate it in .env}"
      Cors__Origins__0: "http://localhost:6173"
      Cors__Origins__1: "http://localhost:6174"
    ports:
      - "6180:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      additional_contexts:
        enterprise-ca: ./certs
    container_name: projecttemplate-frontend
    depends_on:
      - backend
    ports:
      - "6173:80"

  internal:
    build:
      context: ./internal
      dockerfile: Dockerfile
      additional_contexts:
        enterprise-ca: ./certs
    container_name: projecttemplate-internal
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "6174:3000"
    healthcheck:
      # node:22-bookworm-slim has no wget/curl. Use Node's built-in fetch.
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlserver-data:
  postgres-data:
