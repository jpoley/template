name: admin

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/admin.yml"
  pull_request:
    paths:
      - "admin/**"
      - ".github/workflows/admin.yml"

defaults:
  run:
    working-directory: admin

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
