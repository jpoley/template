name: build-images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  build:
    if: ${{ vars.ACR_LOGIN_SERVER != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, internal, backend]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          # Named build context required by each Dockerfile's `COPY --from=
          # enterprise-ca` line. CI builds ship with no real cert in ./certs
          # (the production path) — the in-image installer then no-ops. See
          # docs/enterprise-proxy.md.
          build-contexts: |
            enterprise-ca=./certs
          push: true
          tags: |
            ${{ env.REGISTRY }}/projecttemplate/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/projecttemplate/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
