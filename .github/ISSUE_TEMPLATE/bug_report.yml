name: Bug report
description: Something is broken.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - admin
        - backend
        - infra
        - docs
        - ci
        - unknown
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, browser, .NET SDK, Bun version, commit SHA, environment (dev/staging/prod).
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
