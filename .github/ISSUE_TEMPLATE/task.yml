name: Task (for agent backlog)
description: A concrete, agent-actionable task. Mirrors .tasks/backlog.md entries.
title: "[task] "
labels: ["task"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - admin
        - backend
        - infra
        - docs
        - cross-cutting
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One-sentence outcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What the agent needs to know up-front. Link ADRs, docs, related issues.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How will you verify it's done? (commands, manual steps)
