name: PRD (product requirements doc)
description: Spec a feature for an agent to build. Optimised for closed-loop, machine-verifiable delivery.
title: "[prd] "
labels: ["prd", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        A PRD here is a contract between a human and an agent. It must be precise enough that an agent can
        implement, test, and self-verify without asking follow-up questions. Vague PRDs will be closed.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched [open and closed issues](../issues?q=is%3Aissue) and existing `backlog/` items for duplicates.
          required: true
        - label: The scope is small enough that closed-loop verification (`scripts/test-all.sh` + smoke) can prove it works.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - internal
        - backend
        - infra
        - docs
        - cross-cutting
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: The objective or feature in one or two sentences. State the observable outcome, not the implementation.
      placeholder: |
        Allow admins to bulk-disable user accounts by uploading a CSV of emails, so offboarding a 100-person
        contractor group takes one action instead of 100 clicks.
    validations:
      required: true
  - type: textarea
    id: output_format
    attributes:
      label: Output format
      description: |
        The structure expected from the agent's deliverable. Be concrete — endpoint shapes, request/response JSON,
        UI components added, files created, CLI flags introduced, etc. An agent should be able to scaffold from this alone.
      placeholder: |
        - `POST /api/admin/users/bulk-disable` accepts `multipart/form-data` with `file` (CSV, columns: `email`).
        - Response: `200 { "disabled": number, "skipped": [{ "email": string, "reason": string }] }`.
        - Internal UI: new "Bulk disable" button on `/admin/users` opening a shadcn `Dialog` with file picker + dry-run toggle.
        - New file: `backend/src/ProjectTemplate.Api/Endpoints/UsersBulkDisable.cs`.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: |
        Hard boundaries that must not be crossed. Stack rules, security/perf budgets, files to leave alone, libraries
        forbidden, backwards-compat promises, etc. If a constraint conflicts with the goal, the goal yields.
      placeholder: |
        - Must use the existing `IUserRepository` interface — no direct EF Core calls from the endpoint.
        - No new top-level npm or NuGet dependencies; reuse what's already in `Directory.Packages.props` / `package.json`.
        - Endpoint must require the `admin` role (existing auth middleware).
        - CSV upload capped at 10 MB / 10k rows; reject larger payloads with `413`.
        - No FluentAssertions — tests use Shouldly.
    validations:
      required: true
  - type: textarea
    id: failure_conditions
    attributes:
      label: Failure conditions
      description: |
        Concrete things that make the output unacceptable, even if the happy path works. These become negative
        test cases. Think: silent partial failures, security regressions, perf cliffs, broken neighbours.
      placeholder: |
        - Any single bad row causes the entire batch to roll back instead of being reported in `skipped`.
        - Endpoint returns `200` while leaving users enabled (silent failure).
        - Non-admin caller can invoke the endpoint and get anything other than `403`.
        - Existing `/api/admin/users` list endpoint regresses (response shape or perf).
        - `scripts/test-all.sh` or the smoke step fails on the resulting branch.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: |
        Testable criteria, each paired with **how an agent verifies it in closed loop** — exact command, curl, or UI step.
        "Closed loop" means the agent runs it locally (typically via `scripts/test-all.sh` or `scripts/smoke.sh`) and observes the result,
        not "looks correct on inspection". See `docs/testing.md`.
      value: |
        - [ ] **Criterion:** Happy path — uploading a CSV of 3 valid emails disables all 3 users.
              **Verification:** `scripts/smoke.sh` extended to `curl -F file=@fixture.csv .../bulk-disable` and assert `disabled == 3`, then `GET /api/admin/users` shows `enabled=false` for each.
        - [ ] **Criterion:** Partial failure — mix of valid + unknown emails disables the valid ones and reports the rest in `skipped[]`.
              **Verification:** curl with mixed fixture; assert response body shape and DB state via repeat `GET`.
        - [ ] **Criterion:** Authz — non-admin caller gets `403`.
              **Verification:** xUnit integration test in `backend/tests/` using `WebApplicationFactory<Program>` with a non-admin token.
        - [ ] **Criterion:** UI — new dialog opens, accepts a file, and shows the result summary.
              **Verification:** vitest component test in `internal/src/__tests__/`; manual check via `bun run dev` documented in PR.
        - [ ] **Criterion:** Whole suite green.
              **Verification:** `scripts/test-all.sh` exits 0 (backend tests + frontend/internal typecheck/lint/vitest/build + terraform + closed-loop smoke).
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Things explicitly **not** part of this PRD, to prevent scope creep. Write "none" if everything relevant is in scope.
      placeholder: |
        - Bulk *enable* (separate PRD).
        - Audit log UI for bulk actions — backend writes the log, UI surfaces it later.
    validations:
      required: true
  - type: input
    id: backlog_ref
    attributes:
      label: Backlog reference
      description: Matching `TASK-N` id created via `backlog task create`, or `none` if this issue is the source of truth.
    validations:
      required: true
